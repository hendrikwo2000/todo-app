<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ToDo-Liste</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#4f63d2">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ToDo">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>ToDo-Liste</h1>
      <button id="addCatBtn" class="btn add-cat">＋ Bereich</button>
      <span id="saveStatus" class="save-status"></span>
      <button id="themeBtn" class="btn icon-only" title="Dunkles Design">☾</button>
    </header>

    <main id="board" class="board"><!-- Spalten werden per JS eingefuegt --></main>
  </div>

  <div id="snackbar" class="snackbar" aria-live="polite"></div>

  <div id="lock" class="lock hidden">
    <form id="lockForm" class="lock-box">
      <div class="lock-icon">🔒</div>
      <h2 id="lockTitle">ToDo-Liste entsperren</h2>
      <p class="lock-hint" id="lockHint">Einmal pro Gerät eingeben — wird gespeichert.</p>
      <input type="password" id="lockPass" placeholder="Passwort" autocomplete="current-password">
      <input type="password" id="lockPass2" placeholder="Passwort wiederholen"
             autocomplete="new-password" hidden>
      <button type="submit">Entsperren</button>
      <div id="lockMsg" class="lock-msg" aria-live="polite"></div>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
